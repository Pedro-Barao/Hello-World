<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- Abreviatura -->
    <p>Vamos estudar <abbr title = "Hyper Text Markup Language">HTML</abbr></p>
    <p>Usar o <abbr title = "World Wide Web">WWW</abbr> para pesquisa</p>

    <!-- Endereço -->
    <p>Endereço: <address>Rua das Dores</address></p>

    <!-- Nome de Obra (Citação)-->
    <p>No filme <cite>Carros</cite> Doc Hudson diz: <q>Não é um trofeu, é só uma taça vazia</q></p>

    <!-- Trecho destacado de Artigos -->
    <p>Texto Normal</p>
    <blockquote>Texto com Tab</blockquote>

    <!-- Bidirecional -->
    <p>Direção normal</p>
    <bdo dir = "rtl">Direção contrária</bdo>
    
</body>
</html>
